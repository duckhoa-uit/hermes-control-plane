# OpenAPI 3.1 spec for the hermes-control-plane HTTP surface.
#
# Covers two services:
#   - Worker (Cloudflare): src/worker/index.ts
#   - Launcher sidecar (Bun): src/launcher/server.ts
#
# Source of truth: the route handlers in src/worker/index.ts and
# src/launcher/server.ts. When you add or change a route there, update
# this file in the same PR. The README's "HTTP API" table is the human-
# readable mirror; this file is the machine-readable contract for
# clients (the launcher itself, scripts/api-client.ts, MCP integrations,
# autonomous agents).
#
# Not covered here:
#   - WebSocket upgrades (/sessions/:id/stream and /sessions/:id/runner)
#     — OpenAPI's WS support is still proposal-stage. The framing
#     contract is documented narratively in docs/ARCHITECTURE.md
#     §"WebSocket framing".

openapi: 3.1.0

info:
  title: hermes-control-plane
  version: 0.0.1
  description: |
    Hermes Control Plane HTTP API. Two services share the same surface:

    - **Worker** (Cloudflare Worker, default `http://localhost:8787`) —
      authoritative state machine + event log. Exposes session CRUD,
      session state, the runner-side WS upgrade, GitHub webhook
      receiver, and the PR-index lookup used by the launcher.
    - **Launcher sidecar** (Bun, default `http://localhost:8789`) —
      sandbox lifecycle (E2B) and GitHub PAT custodian. Exposes a
      higher-level session-creation endpoint that drives both the
      Worker (DO init) and E2B (sandbox provision).

    Authentication today:
      - `/webhooks/github` requires a valid `X-Hub-Signature-256` header
        computed with `GITHUB_WEBHOOK_SECRET` (HMAC-SHA-256 over the
        raw body).
      - `/pr-index` requires the shared secret in the
        `X-Hermes-Launcher-Secret` header.
      - Inter-service calls (Worker ↔ launcher) use the same shared
        secret in both directions.
      - All other routes are unauthenticated today and protected by
        Cloudflare Access in production (see `docs/DEPLOYMENT.md`).

    Observability: every Worker response includes an `X-Request-Id`
    header (16-char hex). Logs are NDJSON via `src/core/logger.ts`.
  license:
    name: MIT
    url: https://github.com/duckhoa-uit/hermes-control-plane/blob/main/LICENSE
  contact:
    name: hermes-control-plane
    url: https://github.com/duckhoa-uit/hermes-control-plane

servers:
  - url: http://localhost:8787
    description: Worker — local dev (wrangler dev)
  - url: http://localhost:8789
    description: Launcher sidecar — local dev
  - url: https://{worker_domain}
    description: Worker — production
    variables:
      worker_domain:
        default: hermes-control-plane.example.workers.dev

tags:
  - name: health
    description: Liveness probes.
  - name: sessions
    description: Agent-session lifecycle (Worker-side state machine).
  - name: launcher-sessions
    description: Sandbox-aware session lifecycle (launcher sidecar).
  - name: webhooks
    description: Inbound webhooks from GitHub.
  - name: internal
    description: Worker ↔ launcher internal endpoints.

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe.
      description: |
        Returns 200 with a tiny JSON status payload. Available on both
        the Worker and the launcher (response shape differs slightly).
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                worker:
                  summary: Worker
                  value: { status: ok, service: hermes-control-plane }
                launcher:
                  summary: Launcher
                  value:
                    status: ok
                    activeSessions: 2
                    cap: 10

  /pr-index:
    get:
      tags: [internal]
      summary: Look up the session that owns a PR.
      description: |
        Used by the launcher to find the parent session for an open PR
        when handling amend triggers. Authenticated with the shared
        launcher secret.
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string, example: "owner/repo#42" }
          description: PR key, format <owner>/<repo>#<number>.
      responses:
        "200":
          description: PR index row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrIndexRow"
        "401": { description: Missing or invalid X-Hermes-Launcher-Secret. }
        "404": { description: No row for that key. }
        "503": { description: Launcher secret not configured on this Worker. }
      security:
        - LauncherSharedSecret: []

  /webhooks/github:
    post:
      tags: [webhooks]
      summary: GitHub webhook receiver.
      description: |
        Consumes `pull_request`, `pull_request_review`, and `check_run`
        events. The body must be the raw JSON GitHub sends; the Worker
        verifies HMAC-SHA-256 against the raw bytes.

        Lifecycle handled:
          - `pull_request.closed merged=true` → archive session.
          - `pull_request.closed merged=false` → mark session closed.
          - `pull_request_review.submitted state=changes_requested` →
            spawn an amend session (single-flight per PR, cap of
            `AUTOFIX_CAP_PER_PR`, default 3).
          - `check_run.completed conclusion=failure|timed_out` → ditto.

        See `docs/DEPLOYMENT.md §13.3` for the full matrix.
      parameters:
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema: { type: string, example: "sha256=abc123..." }
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
            enum: [pull_request, pull_request_review, check_run, ping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub webhook payload (shape varies per event).
              additionalProperties: true
      responses:
        "200": { description: Event accepted (idempotent). }
        "401": { description: HMAC mismatch. }
        "503": { description: GITHUB_WEBHOOK_SECRET unset on this Worker. }

  /sessions:
    post:
      tags: [sessions]
      summary: Create a new agent session (Worker, low-level).
      description: |
        Initialises the DO state machine without provisioning a sandbox.
        Clients should usually prefer the launcher's `POST /sessions`
        instead (it provisions E2B for you).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateSessionResponse" }

  /sessions/{sessionId}:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    get:
      tags: [sessions]
      summary: Fetch session state + event log + artifacts.
      responses:
        "200":
          description: Session state snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionStateResponse" }
        "404": { description: Unknown session id. }

  /sessions/{sessionId}/approve:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    post:
      tags: [sessions]
      summary: Resolve a pending approval request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, decision]
              properties:
                requestId: { type: string }
                decision: { type: string, enum: [approve, deny] }
                comment: { type: string }
      responses:
        "200": { description: Decision recorded. }
        "404": { description: Unknown session or request id. }

  /sessions/{sessionId}/abort:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    post:
      tags: [sessions]
      summary: Force-abort a session.
      responses:
        "200": { description: Session moved to aborted. }
        "404": { description: Unknown session id. }

  /sessions/{sessionId}/prompt:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    post:
      tags: [sessions]
      summary: Send a follow-up prompt to a connected runner.
      description: |
        Returns a `PromptResult` that distinguishes the four outcomes:
          - `ok` (200) — accepted, runner picked it up.
          - `queued` (202) — runner is currently disconnected; the prompt
            is buffered as `pendingPrompt` and will be delivered on
            re-attach (subject to the session not being terminal).
          - `no_resume` (409) — session can be re-prompted but has no
            launcher URL configured.
          - `terminal` (410) — session is already in a terminal state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
      responses:
        "200": { description: Accepted. }
        "202": { description: Queued (runner offline). }
        "404": { description: Unknown session id. }
        "409": { description: No-resume (no launcher URL). }
        "410": { description: Session is terminal. }

  /sessions/{sessionId}/create-pr:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    post:
      tags: [sessions]
      summary: Trigger PR creation (called by the launcher on `review_ready`).
      responses:
        "200": { description: PR creation triggered or already complete. }
        "404": { description: Unknown session id. }
        "409": { description: Session not in review_ready. }

  # ------------------------- Launcher --------------------------------

  /sessions/{sessionId}/publish-pr:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    post:
      tags: [launcher-sessions]
      summary: (Launcher) Push the session branch and open the PR.
      description: |
        Launcher-side endpoint the Worker calls on `review_ready` to
        publish the agent's branch and open a PR. Authenticated with
        the shared secret.
      responses:
        "200": { description: PR opened (or already exists). }
        "401": { description: Missing or invalid X-Hermes-Launcher-Secret. }
      security:
        - LauncherSharedSecret: []

  /sessions/{sessionId}/resume:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    post:
      tags: [launcher-sessions]
      summary: (Launcher) Thaw a paused sandbox.
      description: |
        Called by the DO when a follow-up prompt arrives for a session
        whose sandbox was paused. The launcher reconnects via
        `Sandbox.connect` and signals readiness back to the DO.
      responses:
        "200": { description: Sandbox resumed. }
        "401": { description: Missing or invalid X-Hermes-Launcher-Secret. }
      security:
        - LauncherSharedSecret: []

components:
  securitySchemes:
    LauncherSharedSecret:
      type: apiKey
      in: header
      name: X-Hermes-Launcher-Secret
      description: |
        Shared secret authenticating launcher ↔ Worker calls in both
        directions. Generate with `openssl rand -hex 32`.

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string, example: hermes-control-plane }
        activeSessions: { type: integer, description: Launcher only. }
        cap: { type: integer, description: Launcher only. }

    PrIndexRow:
      type: object
      required: [sessionId, prKey]
      properties:
        sessionId: { type: string }
        prKey:
          type: string
          example: "owner/repo#42"
          pattern: "^[^/]+/[^/]+#\\d+$"
        prUrl: { type: string, format: uri }
        branch: { type: string }
        status:
          type: string
          enum: [open, merged, closed]

    CreateSessionRequest:
      type: object
      required: [projectId, taskDescription]
      properties:
        projectId: { type: string }
        taskDescription: { type: string, maxLength: 8000 }
        repoUrl: { type: string, format: uri }
        profile:
          type: object
          description: Partial ProjectProfile override.
          additionalProperties: true
        amendPrUrl:
          type: string
          format: uri
          description: When set, runs as an amend session targeting this PR.
        branchSuffix:
          type: string
          description: Optional readable suffix appended to the agent branch.

    CreateSessionResponse:
      type: object
      required: [id, status]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [created]
        runnerToken:
          type: string
          nullable: true
          description: One-time token the runner uses to upgrade to WS.

    SessionStateResponse:
      type: object
      required: [session, events]
      properties:
        session:
          type: object
          additionalProperties: true
          description: Session record (see src/core/types.ts).
        events:
          type: array
          items:
            type: object
            additionalProperties: true
            description: HermesEvent (see src/core/types.ts).
        artifacts:
          type: object
          nullable: true
          additionalProperties: true
        repoUrl: { type: string, nullable: true }
        baseBranch: { type: string, nullable: true }

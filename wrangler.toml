name = "hermes-control-plane"
main = "src/worker/index.ts"
compatibility_date = "2025-06-20"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["SessionDurableObject"]

[[d1_databases]]
binding = "DB"
database_name = "hermes-db"
database_id = "local"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "hermes-artifacts"

[vars]
E2B_TEMPLATE = "hermes-runner"
MAX_SESSION_RUNTIME_MS = 2700000
HEARTBEAT_TIMEOUT_MS = 900000  # 15 min — see comment on the constant in src/core/constants.ts
# Hobby tier cap is 20 concurrent sandboxes. Leave headroom for retries and
# template builds. See docs/ROADMAP.md section 8.
MAX_CONCURRENT_SESSIONS = 10

# Validate the checked-in current architecture and API references.
#
# The old source paths used by the automatic docs generator were removed during
# the Flue migration. These docs are now maintained alongside the Worker/MCP
# boundary and validated here instead of being regenerated from nonexistent
# launcher files.
name: docs-check

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run typecheck
      - name: Check current architecture docs
        run: |
          test -f docs/ARCHITECTURE.md
          test -f docs/HERMES-AGENT-INTEGRATION.md
          test -f docs/api-reference.md
          test -f docs/OBSERVABILITY.md

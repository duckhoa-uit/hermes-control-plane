# Deploy the Cloudflare Worker (control plane) on every push to main
# that touches worker code. Flue build + wrangler deploy.
name: deploy-worker

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.jsonc'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22.18'

      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Validate production configuration
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          set -euo pipefail
          case "$WORKER_URL" in
            https://*) ;;
            *) echo "WORKER_URL must be configured as an HTTPS GitHub Actions variable" >&2; exit 1 ;;
          esac

          npx wrangler secret list --name hermes-control-plane > /tmp/control-plan-secrets.json
          required_secrets=(
            GITHUB_APP_ID
            GITHUB_APP_PRIVATE_KEY
            GITHUB_WEBHOOK_SECRET
            ZAI_API_KEY
            CONTROL_PLAN_MCP_TOKEN
            CONTROL_PLAN_REPLAY_SECRET
            CONTROL_PLAN_PROXY_SECRET
            CONTROL_PLAN_INTERNAL_SECRET
          )
          for secret in "${required_secrets[@]}"; do
            if ! jq -e --arg secret "$secret" '.[] | select(.name == $secret)' /tmp/control-plan-secrets.json >/dev/null; then
              echo "Missing production Worker secret: $secret" >&2
              exit 1
            fi
          done

      - run: bun run lint

      - run: bun run typecheck

      - name: Flue build
        run: npx flue build --target cloudflare

      - run: bun run bundle:size

      - name: Deploy
        id: wrangler
        run: npx wrangler deploy --var "WORKER_URL:${WORKER_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_URL: ${{ vars.WORKER_URL }}

# Error -> insight pipeline.
#
# When a Sentry issue fires (new or escalating), Sentry sends a webhook
# (https://docs.sentry.io/organization/integrations/integration-platform/webhooks/)
# to a GitHub repository_dispatch event. This workflow consumes that
# event and opens (or updates) a GitHub issue so the on-call has an
# actionable, dedupable artifact instead of a transient Slack ping.
#
# Wiring (one-time, per Sentry project):
#   1. Sentry → Settings → Integrations → Internal Integration → "New".
#   2. Permissions: Issue:Read, Event:Read.
#   3. Webhooks: Issue Alert. URL =
#      https://api.github.com/repos/duckhoa-uit/hermes-control-plane/dispatches
#      Method: POST. Headers:
#        Authorization: token <a fine-grained PAT with `Contents:write` +
#                              `Issues:write` on this repo>
#        Accept: application/vnd.github+json
#      Payload (use Sentry's mustache vars):
#        {
#          "event_type": "sentry-issue",
#          "client_payload": {
#            "issue_id": "{{ data.issue.id }}",
#            "title": "{{ data.issue.title }}",
#            "url": "{{ data.issue.url }}",
#            "project": "{{ data.issue.project.slug }}",
#            "level": "{{ data.issue.level }}",
#            "culprit": "{{ data.issue.culprit }}",
#            "first_seen": "{{ data.issue.firstSeen }}"
#          }
#        }
#
# The action is idempotent: it searches existing open issues for a
# label matching the Sentry issue id and updates that one instead of
# spamming duplicates.

name: sentry-issue

on:
  repository_dispatch:
    types: [sentry-issue]
  workflow_dispatch:
    # Manual trigger for testing. Mirrors the Sentry payload shape.
    inputs:
      issue_id: { description: "Sentry issue id (numeric)", required: true }
      title: { description: "Sentry issue title", required: true }
      url: { description: "Sentry issue URL", required: true }
      project: { description: "Sentry project slug", required: false, default: hermes-control-plane }
      level: { description: "Sentry level (error/warning/...)", required: false, default: error }
      culprit: { description: "Culprit (file:func)", required: false, default: "" }

permissions:
  issues: write

jobs:
  upsert-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Upsert GitHub issue from Sentry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id || inputs.issue_id }}
          TITLE: ${{ github.event.client_payload.title || inputs.title }}
          URL: ${{ github.event.client_payload.url || inputs.url }}
          PROJECT: ${{ github.event.client_payload.project || inputs.project }}
          LEVEL: ${{ github.event.client_payload.level || inputs.level }}
          CULPRIT: ${{ github.event.client_payload.culprit || inputs.culprit }}
          FIRST_SEEN: ${{ github.event.client_payload.first_seen }}
        run: |
          set -euo pipefail
          LABEL="sentry:${ISSUE_ID}"
          # Search for an existing open issue with the dedup label.
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "$LABEL" \
            --json number \
            -q '.[0].number' || true)

          BODY=$(cat <<EOF
          Surfaced from Sentry by automation. **Do not delete the \`sentry:${ISSUE_ID}\` label** — the next webhook will dedupe against it.

          | Field | Value |
          |---|---|
          | Sentry URL | ${URL} |
          | Project | \`${PROJECT}\` |
          | Level | \`${LEVEL}\` |
          | Culprit | \`${CULPRIT:-unknown}\` |
          | First seen | ${FIRST_SEEN:-unknown} |

          ## Runbook

          1. Click the Sentry URL above to view the full stack trace.
          2. Grep production logs for the \`request_id\` tag — see [\`docs/OBSERVABILITY.md\`](../blob/main/docs/OBSERVABILITY.md).
          3. Reproduce locally with the \`X-Request-Id\` header to capture a replay.
          4. Close this issue once a fix has shipped; the next occurrence will reopen it via Sentry's regression detection.
          EOF
          )

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #${EXISTING} for sentry:${ISSUE_ID}"
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body ":bell: New occurrence reported by Sentry at $(date -u +%FT%TZ). See $URL."
          else
            echo "Opening new issue for sentry:${ISSUE_ID}"
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "[sentry] ${TITLE}" \
              --label "$LABEL" \
              --label "bug" \
              --label "from:sentry" \
              --body "$BODY"
          fi

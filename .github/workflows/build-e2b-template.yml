# Rebuild the E2B sandbox template when runner code or the build script
# changes. The template bakes supervisor.js + runner.js into the snapshot,
# so runner changes only reach new sessions after a rebuild.
#
# Running sessions are not affected (they use the snapshot they cloned
# from); only newly created sandboxes pick up the new template.
name: build-e2b-template

on:
  push:
    branches: [main]
    paths:
      - 'src/runner/**'
      - 'infra/e2b/build-template.ts'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build-e2b-template.yml'
  workflow_dispatch:

concurrency:
  group: build-e2b-template
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run template:build
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}

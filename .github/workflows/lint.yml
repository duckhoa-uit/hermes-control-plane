# Lint + format gate.
#
# Runs on every push and PR. Uses oxlint (Rust, ~50-100x faster than ESLint)
# for the lint signal and Biome (Rust) as the formatter check. Both finish
# in under a second on this codebase, so we can afford to run them on every
# event without paths filters.
name: lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun's package store so a cold-cache install drops from
      # ~7s -> <2s on warm runs. Keyed on the lockfile so any
      # dependency bump invalidates the cache automatically.
      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # oxlint: catches real bugs (no-unused-vars, no-floating-promises in
      # tsgolint plugin, no-fallthrough, etc.). Fails the job on any error.
      - name: Lint (oxlint)
        run: bun run lint

      # biome: formatter check only (linter disabled in biome.json so oxlint
      # owns lint). Fails if any tracked file is not formatted.
      - name: Format check (biome)
        run: bun run format:check

      # knip: dead-code / unused-export / unused-dependency detector.
      # We scope to files+exports+deps+unlisted; unused TYPES are excluded
      # because we deliberately ship forward-compat type surface in
      # src/core/types.ts that may not have an internal consumer yet.
      - name: Dead-code check (knip)
        run: bun run deadcode

      # jscpd: copy-paste / duplicate-code detector. Threshold 4% gives
      # headroom over today's 0.12%; CI fails if duplication regresses
      # past that bar.
      - name: Duplicate-code check (jscpd)
        run: bun run dupes

      # Feature flag audit: reconciles feature-flags.json with isFlagEnabled
      # / percentageRollout / flagValue call sites under src/. Fails CI on:
      #   - declared-but-unused flags (dead branch, registry entry to delete)
      #   - used-but-undeclared flags (forgot to register a new flag)
      #   - flags older than maxAgeDays (default 90) still in the codebase
      # See CONTRIBUTING.md §"Feature flags" for the cleanup workflow.
      - name: Feature flag audit (dead/stale flag detection)
        run: bun run flags:check

      # AGENTS.md freshness: every `bun run <script>` and markdown link in
      # AGENTS.md is resolved against package.json + the working tree.
      # Catches stale instructions (renamed scripts, moved docs) before
      # they confuse the next autonomous agent that reads the file.
      - name: AGENTS.md freshness audit
        run: bun run agents:check

      # Alerts sanity check: parses infra/observability/alerts.yaml,
      # verifies every rule has the required fields and points at a
      # real runbook anchor in docs/OBSERVABILITY.md. Catches alerts
      # that would page on-call into a dead-end.
      - name: Alert rules audit
        run: bun run alerts:check

      # OpenAPI sanity check: parses docs/openapi.yaml, verifies every
      # operation has a 2xx/3xx/default response, and that every $ref
      # resolves. Catches drift between the route handlers and the
      # spec without needing a full Spectral install.
      - name: OpenAPI spec sanity check
        run: bun run openapi:check

      # Auto-doc freshness: regenerate docs/api-reference.md +
      # docs/events-reference.md + docs/state-machine.mmd from the
      # source-of-truth files, and fail if the result differs from
      # what's checked in. main also has a docs-refresh workflow that
      # auto-commits the regenerated files, so this PR-time gate exists
      # mostly to flag the drift to the author up front.
      - name: Auto-generated docs freshness
        run: bun run docs:check

  bundle-size:
    name: Worker bundle size budget
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Wrangler dry-run + size budget. Today's bundle is ~272 KiB; budget
      # is 1 MiB and hard limit is the Cloudflare Free-tier 3 MiB upload cap.
      # Numbers + budget % land in the run page's step summary so reviewers
      # don't have to log-dive.
      - name: Bundle size budget
        run: bun run bundle:size

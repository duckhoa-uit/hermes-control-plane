# Error -> insight pipeline.
#
# PostHog fires a webhook when a tracked event matches an alert rule
# (e.g. "first occurrence of an $exception with $exception_type X").
# This workflow receives that webhook as a GitHub repository_dispatch
# event and opens (or updates) a GitHub issue so the on-call has an
# actionable, dedupable artifact instead of a transient Slack ping.
#
# Wiring (one-time, per PostHog project):
#   1. PostHog -> Data pipelines -> Destinations -> "Webhook" -> Create.
#   2. URL = https://api.github.com/repos/duckhoa-uit/hermes-control-plane/dispatches
#      Method = POST
#      Headers:
#        Authorization: token <a fine-grained PAT with `Contents:write` +
#                              `Issues:write` on this repo>
#        Accept: application/vnd.github+json
#      Payload (PostHog Hog templating uses single braces `{ }`; the
#      legacy double-brace `{{ }}` Liquid syntax is opt-in via the
#      "Templating" dropdown on the destination, but the default Hog
#      flavour is shown here):
#        {
#          "event_type": "posthog-issue",
#          "client_payload": {
#            "issue_id": "{event.properties.$exception_fingerprint}",
#            "title": "{event.properties.$exception_type}: {event.properties.$exception_message}",
#            "url": "{event.url}",
#            "project": "{project.name}",
#            "level": "error",
#            "culprit": "{event.properties.path} {event.properties.method}",
#            "first_seen": "{event.timestamp}"
#          }
#        }
#   3. Filters: event = "$exception", optionally throttle to first
#      occurrence only (Insights -> filter -> Math: first time per
#      property = $exception_fingerprint).
#
# Idempotent: dedupes by a `posthog:<fingerprint>` label so a recurring
# error doesn't spam the issue list.

name: posthog-issue

on:
  repository_dispatch:
    types: [posthog-issue]
  workflow_dispatch:
    # Manual trigger for testing. Mirrors the PostHog payload shape.
    inputs:
      issue_id: { description: "PostHog $exception_fingerprint", required: true }
      title: { description: "Issue title", required: true }
      url: { description: "PostHog error URL", required: true }
      project: { description: "PostHog project slug", required: false, default: hermes-control-plane }
      level: { description: "level (error/warning/...)", required: false, default: error }
      culprit: { description: "Culprit (path/method)", required: false, default: "" }

permissions:
  issues: write

jobs:
  upsert-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Upsert GitHub issue from PostHog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id || inputs.issue_id }}
          TITLE: ${{ github.event.client_payload.title || inputs.title }}
          URL: ${{ github.event.client_payload.url || inputs.url }}
          PROJECT: ${{ github.event.client_payload.project || inputs.project }}
          LEVEL: ${{ github.event.client_payload.level || inputs.level }}
          CULPRIT: ${{ github.event.client_payload.culprit || inputs.culprit }}
          FIRST_SEEN: ${{ github.event.client_payload.first_seen }}
        run: |
          set -euo pipefail
          LABEL="posthog:${ISSUE_ID}"
          # Search for an existing open issue with the dedup label.
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "$LABEL" \
            --json number \
            -q '.[0].number' || true)

          BODY=$(cat <<EOF
          Surfaced from PostHog by automation. **Do not delete the \`posthog:${ISSUE_ID}\` label** — the next webhook will dedupe against it.

          | Field | Value |
          |---|---|
          | PostHog URL | ${URL} |
          | Project | \`${PROJECT}\` |
          | Level | \`${LEVEL}\` |
          | Culprit | \`${CULPRIT:-unknown}\` |
          | First seen | ${FIRST_SEEN:-unknown} |

          ## Runbook

          1. Click the PostHog URL above to view the full stack trace and event properties.
          2. Grep production logs for the \`request_id\` tag — see [\`docs/OBSERVABILITY.md\`](../blob/main/docs/OBSERVABILITY.md).
          3. Reproduce locally with the \`X-Request-Id\` header to capture a replay.
          4. Close this issue once a fix has shipped; the next occurrence reopens it via a new webhook delivery.
          EOF
          )

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #${EXISTING} for posthog:${ISSUE_ID}"
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body ":bell: New occurrence reported by PostHog at $(date -u +%FT%TZ). See $URL."
          else
            echo "Opening new issue for posthog:${ISSUE_ID}"
            # gh issue create --label rejects unknown labels. Pre-create
            # the per-fingerprint dedup label + the two static ones; the
            # `|| true` makes the create idempotent on subsequent runs
            # (where the labels already exist).
            gh label create "$LABEL" --repo "$GITHUB_REPOSITORY" --color FF6B6B --description "Sentry-style dedup key for the PostHog $exception_fingerprint" 2>/dev/null || true
            gh label create "bug" --repo "$GITHUB_REPOSITORY" --color d73a4a 2>/dev/null || true
            gh label create "from:posthog" --repo "$GITHUB_REPOSITORY" --color 5319e7 --description "Issue surfaced by the PostHog -> GitHub webhook automation" 2>/dev/null || true
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "[posthog] ${TITLE}" \
              --label "$LABEL" \
              --label "bug" \
              --label "from:posthog" \
              --body "$BODY"
          fi
